<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мэдээний сайт</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
        }

        /* Мэдээний жагсаалт */
        .news-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .news-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .news-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .news-card-content {
            padding: 20px;
        }

        .news-card-category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .news-card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .news-card-meta {
            font-size: 12px;
            color: #888;
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        /* Модал цонх */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 900px;
            border-radius: 16px;
            margin: 30px auto;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 32px;
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            z-index: 10;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #000;
        }

        .modal-image {
            width: 100%;
            height: auto;
            max-height: 450px;
            object-fit: cover;
            border-radius: 16px 16px 0 0;
        }

        .modal-body {
            padding: 30px;
        }

        .modal-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .modal-meta {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .modal-meta i {
            margin-right: 5px;
        }

        .modal-description {
            line-height: 1.8;
            color: #444;
            font-size: 16px;
        }

        .share-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .share-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .share-btn:hover {
            transform: scale(1.05);
        }

        .share-facebook { background: #1877f2; color: white; }
        .share-twitter { background: #1da1f2; color: white; }
        .share-whatsapp { background: #25D366; color: white; }
        .share-copy { background: #64748b; color: white; }

        /* Footer */
        .footer {
            background: #2d3748;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

        @media (max-width: 768px) {
            .news-container {
                grid-template-columns: 1fr;
            }
            .modal-body {
                padding: 20px;
            }
            .modal-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-newspaper"></i> Мэдээний төв</h1>
        <p>Хамгийн сүүлийн үеийн мэдээ, мэдээлэл</p>
    </div>

    <div class="news-container" id="newsContainer"></div>

    <div class="footer">
        <p>&copy; 2024 Мэдээний төв. Бүх эрх хуулиар хамгаалагдсан.</p>
    </div>

    <!-- Модал цонх -->
    <div id="newsModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <img id="modalImage" class="modal-image" src="" alt="">
            <div class="modal-body">
                <h2 id="modalTitle" class="modal-title"></h2>
                <div id="modalMeta" class="modal-meta"></div>
                <div id="modalContent" class="modal-description"></div>
                <div id="modalShare" class="share-section">
                    <span class="share-label"><i class="fas fa-share-alt"></i> Хуваалцах:</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== ӨГӨГДӨЛ ====================
        
        // Зохиолчдын өгөгдөл
        const authorsData = [
            { id: 1, name: "Баттулга" },
            { id: 2, name: "Сарнай" },
            { id: 3, name: "Энхбат" },
            { id: 4, name: "Номин" }
        ];

        // Мэдээний өгөгдөл
        const newsData = [
            {
                id: 1,
                title: "Шинэ технологийн дэвшил: Хиймэл оюун ухаан",
                category: "Технологи",
                image: "https://picsum.photos/id/1/800/450",
                description: "Хиймэл оюун ухаан нь өдөр бүр шинэ боломжуудыг нээж байна. Энэхүү технологи нь эрүүл мэнд, боловсрол, тээвэр зэрэг олон салбарт хувьсгал хийж байна. Сүүлийн үеийн судалгаагаар хиймэл оюун ухааны зах зээл 2030 он гэхэд 1.8 их наяд долларт хүрэх төлөвтэй байна.",
                video_link: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
                author_id: 1,
                created_at: "2024-01-15T10:30:00"
            },
            {
                id: 2,
                title: "Уур амьсгалын өөрчлөлт: Дэлхий нийтийн сорилт",
                category: "Байгаль орчин",
                image: "https://picsum.photos/id/15/800/450",
                description: "Дэлхийн дулаарал нь хүн төрөлхтний тулгарч буй хамгийн том сорилтын нэг болоод байна. Ногоон энергид шилжих, нүүрстөрөгчийн ялгаралтыг бууруулах зэрэг арга хэмжээнүүдийг дэлхий нийтийн хэмжээнд авч хэрэгжүүлж байна.",
                video_link: "",
                author_id: 2,
                created_at: "2024-01-14T14:20:00"
            },
            {
                id: 3,
                title: "Спорт: Шигшээ багийн амжилт",
                category: "Спорт",
                image: "https://picsum.photos/id/29/800/450",
                description: "Монголын шигшээ баг олон улсын тэмцээнд түрүүлж, улсынхаа нэр хүндийг өндөрт өргөв. Багийн гишүүд шаргуу бэлтгэлийн үр дүнд амжилттай оролцож, алтан медаль хүртлээ.",
                video_link: "https://youtu.be/dQw4w9WgXcQ",
                author_id: 3,
                created_at: "2024-01-13T09:15:00"
            },
            {
                id: 4,
                title: "Эдийн засгийн өсөлт: Шинэ боломжууд",
                category: "Эдийн засаг",
                image: "https://picsum.photos/id/20/800/450",
                description: "Улсын эдийн засаг өнгөрсөн улиралд 5.2 хувиар өссөн нь сүүлийн 5 жилийн хамгийн өндөр үзүүлэлт юм. Энэ нь гадаад хөрөнгө оруулалт нэмэгдэж, дотоодын үйлдвэрлэл идэвхжсэнтэй холбоотой.",
                video_link: "",
                author_id: 4,
                created_at: "2024-01-12T11:45:00"
            },
            {
                id: 5,
                title: "Боловсролын шинэчлэл: Цахим сургалт",
                category: "Боловсрол",
                image: "https://picsum.photos/id/26/800/450",
                description: "Боловсролын салбарт цахим сургалтын систем нэвтрүүлж, сурагчдын мэдлэг чадварыг дээшлүүлэхэд анхаарч байна. Шинэ систем нь хичээлийн агуулгыг илүү сонирхолтой, хүртээмжтэй болгож байна.",
                video_link: "https://www.youtube.com/embed/dQw4w9WgXcQ",
                author_id: 1,
                created_at: "2024-01-11T08:00:00"
            }
        ];

        // ==================== HTML-ийг аюулгүй болгох функц ====================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== YouTube embed HTML авах функц ====================
        function getYouTubeEmbedHtml(videoLink) {
            if (!videoLink) return '';
            
            let videoId = null;
            
            // YouTube холбоосноос ID гаргаж авах
            if (videoLink.includes('youtube.com/watch')) {
                const urlParams = new URLSearchParams(videoLink.split('?')[1]);
                videoId = urlParams.get('v');
            } else if (videoLink.includes('youtu.be/')) {
                videoId = videoLink.split('youtu.be/')[1]?.split('?')[0];
            } else if (videoLink.includes('embed/')) {
                videoId = videoLink.split('embed/')[1]?.split('?')[0];
            }
            
            if (videoId) {
                return `<div style="margin-bottom: 20px; position: relative; padding-bottom: 56.25%; height: 0;">
                            <iframe src="https://www.youtube.com/embed/${videoId}" 
                                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" 
                                    frameborder="0" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                    allowfullscreen>
                            </iframe>
                        </div>`;
            }
            
            return '';
        }

        // ==================== Мэдээний картуудыг харуулах ====================
        function displayNewsCards() {
            const container = document.getElementById('newsContainer');
            if (!container) return;
            
            container.innerHTML = '';
            
            newsData.forEach(news => {
                const author = authorsData.find(a => a.id === news.author_id) || { name: "Сэтгүүлч" };
                const card = document.createElement('div');
                card.className = 'news-card';
                card.onclick = () => openModal(news.id);
                
                card.innerHTML = `
                    <img src="${news.image}" alt="${escapeHtml(news.title)}" onerror="this.src='https://picsum.photos/id/1/800/450'">
                    <div class="news-card-content">
                        <span class="news-card-category">${escapeHtml(news.category)}</span>
                        <h3 class="news-card-title">${escapeHtml(news.title)}</h3>
                        <p class="news-card-meta">
                            <span><i class="far fa-calendar"></i> ${new Date(news.created_at).toLocaleDateString('mn-MN')}</span>
                            <span><i class="fas fa-user"></i> ${escapeHtml(author.name)}</span>
                        </p>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // ==================== Модалыг хаах функц ====================
        window.closeModal = function() {
            const modal = document.getElementById('newsModal');
            if (modal) {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
            
            // URL-ийг цэвэрлэх
            if (window.location.search.includes('id=')) {
                const cleanUrl = window.location.pathname;
                history.pushState({ modalOpen: false }, '', cleanUrl);
            }
        };

        // ==================== Модал нээх функц ====================
        window.openModal = function(id) {
            const news = newsData.find(n => n.id === id);
            if (!news) return;
            
            const author = authorsData.find(a => a.id === news.author_id) || { name: "Сэтгүүлч" };
            const videoHtml = getYouTubeEmbedHtml(news.video_link);
            const currentUrl = `${window.location.origin}${window.location.pathname}?id=${news.id}`;
            const newsTitle = encodeURIComponent(news.title);
            
            // Модалын үндсэн элементүүд
            document.getElementById('modalTitle').innerText = news.title;
            document.getElementById('modalImage').src = news.image || 'https://picsum.photos/id/1/800/450';
            document.getElementById('modalMeta').innerHTML = `
                <i class="fas fa-tag"></i> ${escapeHtml(news.category)} &nbsp;|&nbsp;
                <i class="far fa-calendar"></i> ${new Date(news.created_at).toLocaleDateString('mn-MN')} &nbsp;|&nbsp;
                <i class="fas fa-user"></i> ${escapeHtml(author.name)}
            `;
            
            // Агуулгыг аюулгүй харагдуулах
            const safeDescription = escapeHtml(news.description || 'Агуулга байхгүй');
            document.getElementById('modalContent').innerHTML = videoHtml + '<p>' + safeDescription.replace(/\n/g, '<br>') + '</p>';
            
            // Хуваалцах хэсгийг цэвэрлэх
            const shareContainer = document.getElementById('modalShare');
            shareContainer.innerHTML = '<span class="share-label"><i class="fas fa-share-alt"></i> Хуваалцах:</span>';
            
            // Facebook товч
            const facebookBtn = document.createElement('a');
            facebookBtn.href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(currentUrl)}&quote=${newsTitle}`;
            facebookBtn.target = '_blank';
            facebookBtn.rel = 'noopener noreferrer';
            facebookBtn.className = 'share-btn share-facebook';
            facebookBtn.innerHTML = '<i class="fab fa-facebook"></i> Facebook';
            shareContainer.appendChild(facebookBtn);
            
            // Twitter товч
            const twitterBtn = document.createElement('a');
            twitterBtn.href = `https://twitter.com/intent/tweet?url=${encodeURIComponent(currentUrl)}&text=${newsTitle}`;
            twitterBtn.target = '_blank';
            twitterBtn.rel = 'noopener noreferrer';
            twitterBtn.className = 'share-btn share-twitter';
            twitterBtn.innerHTML = '<i class="fab fa-twitter"></i> Twitter';
            shareContainer.appendChild(twitterBtn);
            
            // WhatsApp товч
            const whatsappBtn = document.createElement('a');
            whatsappBtn.href = `https://wa.me/?text=${newsTitle}%20-%20${encodeURIComponent(currentUrl)}`;
            whatsappBtn.target = '_blank';
            whatsappBtn.rel = 'noopener noreferrer';
            whatsappBtn.className = 'share-btn share-whatsapp';
            whatsappBtn.innerHTML = '<i class="fab fa-whatsapp"></i> WhatsApp';
            shareContainer.appendChild(whatsappBtn);
            
            // Холбоос хуулах товч
            const copyBtn = document.createElement('button');
            copyBtn.className = 'share-btn share-copy';
            copyBtn.innerHTML = '<i class="fas fa-link"></i> Холбоос хуулах';
            
            // Хуулах функц
            copyBtn.onclick = async () => {
                try {
                    await navigator.clipboard.writeText(currentUrl);
                    copyBtn.innerHTML = '<i class="fas fa-check"></i> Хуулагдлаа!';
                    setTimeout(() => {
                        copyBtn.innerHTML = '<i class="fas fa-link"></i> Холбоос хуулах';
                    }, 2000);
                } catch (err) {
                    console.error('Хуулахад алдаа гарлаа:', err);
                    // Fallback for older browsers
                    const textarea = document.createElement('textarea');
                    textarea.value = currentUrl;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    copyBtn.innerHTML = '<i class="fas fa-check"></i> Хуулагдлаа!';
                    setTimeout(() => {
                        copyBtn.innerHTML = '<i class="fas fa-link"></i> Холбоос хуулах';
                    }, 2000);
                }
            };
            
            shareContainer.appendChild(copyBtn);
            
            // Модалыг харуулах
            const modal = document.getElementById('newsModal');
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            
            // URL-ийг түүхэнд хадгалах
            history.pushState({ id: news.id, modalOpen: true }, news.title, `?id=${news.id}`);
        };

        // ==================== ESC товчоор хаах ====================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('newsModal');
                if (modal && modal.style.display === 'flex') {
                    closeModal();
                }
            }
        });

        // ==================== Буцах товчны үйлдэл ====================
        window.addEventListener('popstate', function(event) {
            if (event.state && event.state.modalOpen && event.state.id) {
                window.openModal(event.state.id);
            } else {
                const modal = document.getElementById('newsModal');
                if (modal && modal.style.display === 'flex') {
                    closeModal();
                }
            }
        });

        // ==================== Модалын гадна дарвал хаах ====================
        document.getElementById('newsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // ==================== Хуудас ачаалахад URL-ээс id унших ====================
        function checkUrlForNews() {
            const urlParams = new URLSearchParams(window.location.search);
            const newsId = urlParams.get('id');
            if (newsId) {
                const id = parseInt(newsId);
                if (newsData.find(n => n.id === id)) {
                    setTimeout(() => openModal(id), 100);
                }
            }
        }

        // ==================== Эхлүүлэх ====================
        displayNewsCards();
        checkUrlForNews();
    </script>
</body>
</html>
